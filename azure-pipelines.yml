trigger:
- master

pool:
  vmImage: 'Ubuntu-16.04'

variables:
  buildConfiguration: 'Release'
  testPath: '$(Build.SourcesDirectory)/CPX.Configuration.Test'
  coveragePath: '$(testPath)/TestResults/Coverage'
  coveragePathCoberturaFile: '$(coveragePath)/coverage.cobertura.xml'
  coveragePathOpencoverFile: '$(coveragePath)/coverage.opencover.xml'

steps:
- task: SonarCloudPrepare@1
  inputs:
    SonarCloud: 'b595c2a5-7f6b-4a6d-a5a9-d7d2422d323c'
    organization: 'cassianopeixoto-github'
    projectKey: 'cassianopeixoto'
    projectName: 'cpx.configuration'
    extraProperties: 'sonar.cs.opencover.reportsPaths=$(coveragePathOpencoverFile)'

- task: DotNetCoreCLI@2
  displayName: Build
  inputs:
    command: build
    projects: '**/*.csproj'
    arguments: '--configuration $(buildConfiguration)'

- task: DotNetCoreCLI@2
  displayName: 'Test cobertura'
  inputs:
    command: test
    projects: '**/*Test/*.csproj'
    arguments: '--configuration $(buildConfiguration) /p:CollectCoverage=true CoverletOutputFormat=cobertura /p:CoverletOutput=$(coveragePathCoberturaFile) /p:Exclude="[xunit*]*"'

- task: DotNetCoreCLI@2
  displayName: 'Test opencover'
  inputs:
    command: test
    projects: '**/*Test/*.csproj'
    arguments: '--configuration $(buildConfiguration) /p:CollectCoverage=true CoverletOutputFormat=opencover /p:CoverletOutput=$(coveragePathOpencoverFile) /p:Exclude="[xunit*]*"'
- task: PublishCodeCoverageResults@1
  inputs:
    codeCoverageTool: 'Cobertura'
    summaryFileLocation: '$(coveragePathCoberturaFile)'
    failIfCoverageEmpty: true   

- task: SonarQubeAnalyze@4
  displayName: 'SonarQubeAnalyze'    

- task: SonarCloudPublish@1
  displayName: 'SonarQubePublish'

