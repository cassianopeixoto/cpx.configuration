trigger:
- master

pool:
  vmImage: 'Ubuntu-16.04'

variables:
  buildConfiguration: 'Release'
  testPath: '$(Build.SourcesDirectory)/CPX.Configuration.Test'
  coveragePath: '$(testPath)/TestResults/Coverage'

steps:
- task: SonarCloudPrepare@1
  inputs:
      SonarCloud: 'b595c2a5-7f6b-4a6d-a5a9-d7d2422d323c'
      organization: 'cassianopeixoto-github'
      projectKey: 'cassianopeixoto'
      projectName: 'cpx.configuration'

- task: DotNetCoreCLI@2
  displayName: Build
  inputs:
    command: build
    projects: '**/*.csproj'
    arguments: '--configuration $(buildConfiguration)'

- task: DotNetCoreCLI@2
  displayName: Test
  inputs:
    command: test
    projects: '**/*Test/*.csproj'
    arguments: '--configuration $(buildConfiguration) /p:CollectCoverage=true /p:CoverletOutputFormat=cobertura /p:CoverletOutput=$(coveragePath) /p:Exclude="[xunit*]*"'

- task: DotNetCoreCLI@2
  displayName: Coverage
  inputs:
    command: 'custom'
    projects: '$(testPath)/CPX.Configuration.Test.csproj'
    custom: 'reportgenerator'
    arguments: '"-reports:$(coveragePath)/coverage.cobertura.xml" "-targetdir:results" "-reporttypes:HTMLInline;HTMLChart"'

- task: SonarQubeAnalyze@4
  displayName: 'SonarQubeAnalyze'    

- task: SonarCloudPublish@1
  displayName: 'SonarQubePublish'





