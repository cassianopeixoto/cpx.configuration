trigger:
- master

pool:
  vmImage: 'Ubuntu-16.04'

variables:
  buildConfiguration: 'Release'

steps:
- task: SonarCloudPrepare@1
  inputs:
      SonarCloud: 'b595c2a5-7f6b-4a6d-a5a9-d7d2422d323c'
      organization: 'cassianopeixoto-github'
      projectKey: 'cassianopeixoto'
      projectName: 'cpx.configuration'

- task: DotNetCoreCLI@2
  displayName: Build
  inputs:
    command: build
    projects: '**/*.csproj'
    arguments: '--configuration Release'

- task: DotNetCoreCLI@2
  displayName: Test
  inputs:
    command: test
    projects: '**/*Test/*.csproj'
    arguments: '--configuration $(buildConfiguration) /p:CollectCoverage=true /p:CoverletOutputFormat=\"opencover,lcov\" /p:CoverletOutput=../lcov /p:Exclude="[xunit*]*"'

- task: SonarQubeAnalyze@4
  displayName: 'SonarQubeAnalyze'    

- task: SonarCloudPublish@1
  displayName: 'SonarQubePublish'

