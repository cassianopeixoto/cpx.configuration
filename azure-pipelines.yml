trigger:
- master

pool:
  vmImage: 'Ubuntu-16.04'

variables:
  buildConfiguration: 'Release'

steps:
- task: SonarQubePrepare@4
  displayName: 'SonarQubePrepare'
  inputs:
    SonarQube: '4fb36f94-3c63-42ab-9ba5-5bce6bd0ea2d'
    projectKey: 'cassianopeixoto_cpx.configuration'
    projectName: 'cpx.configuration'

- task: DotNetCoreCLI@2
  displayName: Build
  inputs:
    command: build
    projects: '**/*.csproj'
    arguments: '--configuration Release'

- task: DotNetCoreCLI@2
  displayName: Test
  inputs:
    command: test
    projects: '**/*Test/*.csproj'
    arguments: '--configuration $(buildConfiguration)  /p:CollectCoverage=true /p:Exclude="[xunit*]*"'

- task: SonarQubeAnalyze@4
  displayName: 'SonarQubeAnalyze'    

- task: SonarQubePublish@4
  displayName: 'SonarQubePublish'

